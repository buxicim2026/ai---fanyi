<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 多语言翻译工具</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌐 AI 多语言翻译工具</h1>
            <p>支持文本 → 中文翻译 + 双语字幕导出</p>
        </header>

        <div class="main-content">
            <section class="upload-section">
                <h2>1. 上传内容</h2>
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📁</div>
                    <p>拖拽文件到此处，或点击选择文件</p>
                    <p class="supported-formats">支持：TXT, SRT, JSON</p>
                    <input type="file" id="fileInput" multiple accept=".txt,.srt,.json">
                </div>
                <div class="file-list" id="fileList"></div>
            </section>

            <section class="config-section">
                <h2>2. API 配置</h2>
                <div class="form-group">
                    <label for="apiKey">Qwen API Key:</label>
                    <input type="password" id="apiKey" placeholder="请输入您的 API Key">
                    <small>您的 API Key 仅存储在本地，不会上传到服务器</small>
                </div>
                <div class="form-group">
                    <label for="apiEndpoint">API 端点:</label>
                    <input type="text" id="apiEndpoint" value="https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation">
                </div>
                <div class="form-group">
                    <label for="sourceLang">源语言:</label>
                    <select id="sourceLang">
                        <option value="auto">自动检测</option>
                        <option value="en">英语</option>
                        <option value="ja">日语</option>
                        <option value="ko">韩语</option>
                        <option value="fr">法语</option>
                        <option value="de">德语</option>
                        <option value="es">西班牙语</option>
                        <option value="ru">俄语</option>
                        <option value="pt">葡萄牙语</option>
                        <option value="it">意大利语</option>
                    </select>
                </div>
            </section>

            <section class="control-section">
                <h2>3. 翻译控制</h2>
                <div class="button-group">
                    <button id="startTranslate" class="btn btn-primary">🚀 开始翻译</button>
                    <button id="stopTranslate" class="btn btn-danger" disabled>⏹ 停止</button>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <p class="status-text" id="statusText">就绪</p>
            </section>

            <section class="result-section">
                <h2>4. 翻译结果</h2>
                <div class="result-tabs">
                    <button class="tab-btn active" data-tab="original">原文</button>
                    <button class="tab-btn" data-tab="translated">译文</button>
                    <button class="tab-btn" data-tab="bilingual">双语</button>
                </div>
                <div class="result-content">
                    <textarea id="originalText" placeholder="原文将显示在这里..." readonly></textarea>
                    <textarea id="translatedText" placeholder="译文将显示在这里..." readonly></textarea>
                    <textarea id="bilingualText" placeholder="双语内容将显示在这里..." readonly></textarea>
                </div>
            </section>

            <section class="export-section">
                <h2>5. 导出文件</h2>
                <div class="export-buttons">
                    <button id="exportTxt" class="btn btn-success" disabled>📄 导出双语 TXT</button>
                    <button id="exportSrt" class="btn btn-success" disabled>🎬 导出 SRT 字幕</button>
                    <button id="exportJson" class="btn btn-success" disabled>📊 导出 JSON</button>
                </div>
            </section>
        </div>

        <footer>
            <p>Powered by Qwen AI</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
